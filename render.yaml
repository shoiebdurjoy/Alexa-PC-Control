services:
  - type: web
    name: alexa-pc-control-backend
    env: node
    region: oregon
    plan: starter
    rootDir: backend-api
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: AGENT_SECRET_TOKEN
        sync: false
      - key: ALEXA_SKILL_SECRET
        sync: false
    healthCheckPath: /health
